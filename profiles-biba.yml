profiles:
  - name: hls-720
    description: Single 720p HLS stream with one thumbnail
    encodes:
      - type: X264Encode
        suffix: _720
        height: 720
        twoPass: false
        params:
          b:v: 2800k
          maxrate: 3360k
          bufsize: 5600k
          pix_fmt: yuv420p
          profile:v: baseline
          level: "3.1"
          preset: fast
        audioEncode:
          type: AudioEncode
          codec: aac
          bitrate: 128k
          suffix: _STEREO
        hlsEncode:
          type: HlsEncode
          segmentDuration: 4
          playlistType: vod
      - type: ThumbnailEncode
        suffix: _thumb
        percentages:
          - 10

  - name: hls-480-360
