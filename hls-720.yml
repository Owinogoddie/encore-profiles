name: hls-720
description: 720p HLS with thumbnail
encodes:
  - type: X264Encode
    suffix: _720
    height: 720
    twoPass: false
    params:
      b:v: 2800k
      maxrate: 3360k
      bufsize: 5600k
      pix_fmt: yuv420p
      profile:v: baseline
      level: "3.1"
      preset: fast
    audioEncode:
      type: AudioEncode
      codec: aac
      bitrate: 128k
      suffix: _audio
    hlsEncode:
      type: HlsEncode
      segmentDuration: 4
      playlistType: vod
  - type: ThumbnailEncode
    suffix: _thumb
    percentages:
      - 10